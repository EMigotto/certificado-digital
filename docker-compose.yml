version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: certdigital-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: certdigital
      POSTGRES_PASSWORD: certdigital
      POSTGRES_DB: certdigital
      # C5: Secret for encrypting private keys at rest (min 32 chars, change in production)
      PRIVATE_KEY_ENCRYPTION_SECRET: dev-only-private-key-secret-that-must-be-changed-in-production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U certdigital']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
